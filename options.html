<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: sans-serif;
      background: #14151b;
      color: #f1ede4;
      padding: 24px;
      width: 360px;
    }

    h2 {
      margin-top: 0;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f1016;
      color: #f1ede4;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #6e9bff;
      color: #0c1018;
      font-weight: 600;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      color: #6e9bff;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <h2>🐦 Wingman Settings</h2>
  <p style="font-size:13px;color:#9aa0b0;">Paste your Groq API key (stored only in your browser, paste once).</p>
  <p style="font-size:13px;"><a href="https://console.groq.com/keys" target="_blank" style="color:#6e9bff;">→ Get a free
      Groq key here</a></p>
  <input id="key" type="password" placeholder="gsk_...">
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>

</html>
